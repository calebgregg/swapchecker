<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>✈️ PCS Swap — Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#222;padding:16px;font-size:14px}
h1{font-size:18px;font-weight:800;color:#1a73e8;margin-bottom:4px}
.sub{font-size:12px;color:#888;margin-bottom:16px}
.card{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card h2{font-size:14px;font-weight:700;color:#333;margin-bottom:10px}
input,select{width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid #ddd;font-size:13px;background:#fff;margin-bottom:8px;-webkit-appearance:none}
.btn{width:100%;padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;min-height:44px;margin-bottom:8px}
.btn-primary{background:#1a73e8;color:#fff}
.btn-success{background:#4a8c1c;color:#fff}
.btn-danger{background:#d94040;color:#fff}
.btn-ghost{background:transparent;border:1.5px solid #1a73e8;color:#1a73e8}
.token-box{background:#f5f7ff;border:1.5px solid #1a73e8;border-radius:10px;padding:12px;margin-top:8px;word-break:break-all;font-size:12px;font-family:monospace;color:#1558b0;display:none}
.token-list .token-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:12px}
.token-row:last-child{border-bottom:none}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.badge-unused{background:#eef7e6;color:#2a5c08;border:1px solid #4a8c1c}
.badge-used{background:#fdf0f0;color:#7a1010;border:1px solid #d94040}
.badge-expired{background:#f5f5f5;color:#888;border:1px solid #ccc}
.login-wrap{max-width:380px;margin:40px auto}
.error{color:#d94040;font-size:12px;margin-top:4px;display:none}
.copy-btn{padding:6px 12px;border-radius:8px;border:1px solid #1a73e8;background:#e8f0fe;color:#1558b0;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;min-height:36px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="login-wrap">
  <h1>✈️ PCS Swap Admin</h1>
  <p class="sub">Sign in to manage access tokens</p>
  <div class="card">
    <h2>Sign In</h2>
    <input type="email" id="login-email" placeholder="Email address">
    <input type="password" id="login-password" placeholder="Password">
    <p class="error" id="login-error">Invalid email or password.</p>
    <button class="btn btn-primary" onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel" style="display:none">
  <h1>✈️ PCS Swap Admin</h1>
  <p class="sub" id="admin-email-sub"></p>

  <!-- GENERATE TOKEN -->
  <div class="card">
    <h2>Generate Install Link</h2>
    <input type="text" id="recipient-name" placeholder="Recipient name (e.g. John Smith)">
    <select id="token-expiry">
      <option value="24">Expires in 24 hours</option>
      <option value="48" selected>Expires in 48 hours</option>
      <option value="72">Expires in 72 hours</option>
      <option value="168">Expires in 7 days</option>
    </select>
    <button class="btn btn-success" onclick="generateToken()">＋ Generate Link</button>
    <div class="token-box" id="generated-box">
      <div style="font-size:11px;color:#555;margin-bottom:6px;font-family:sans-serif">Send this link to <span id="gen-name-label" style="font-weight:700"></span>:</div>
      <div id="generated-url" style="margin-bottom:8px"></div>
      <button class="copy-btn" onclick="copyToken()" style="width:100%">📋 Copy Link</button>
    </div>
  </div>

  <!-- TOKEN LIST -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <h2 style="margin-bottom:0">Active Tokens</h2>
      <button class="copy-btn" onclick="loadTokens()">↻ Refresh</button>
    </div>
    <div class="token-list" id="token-list">
      <p style="font-size:12px;color:#aaa">Loading...</p>
    </div>
  </div>

  <button class="btn btn-ghost" onclick="doSignOut()">Sign Out</button>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, serverTimestamp, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyC1yqbVvvqP76RZ4qNXmap2pbR0AfxwPF8",
  authDomain: "pcs-swap-tool.firebaseapp.com",
  projectId: "pcs-swap-tool",
  storageBucket: "pcs-swap-tool.firebasestorage.app",
  messagingSenderId: "786168505785",
  appId: "1:786168505785:web:09fe24b0917296ab6ec268"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let lastGeneratedUrl = '';

onAuthStateChanged(auth, user => {
  if (user) {
    currentUser = user;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    document.getElementById('admin-email-sub').textContent = `Signed in as ${user.email}`;
    loadTokens();
  } else {
    currentUser = null;
    document.getElementById('login-screen').style.display = 'block';
    document.getElementById('admin-panel').style.display = 'none';
  }
});

window.doLogin = async () => {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch (e) {
    errEl.style.display = 'block';
  }
};

window.doSignOut = async () => { await signOut(auth); };

window.generateToken = async () => {
  const name = document.getElementById('recipient-name').value.trim();
  if (!name) { alert('Enter a recipient name first.'); return; }
  const hours = parseInt(document.getElementById('token-expiry').value);
  const expiresAt = new Date(Date.now() + hours * 3600000);

  // Generate a cryptographically random token
  const array = new Uint8Array(20);
  crypto.getRandomValues(array);
  const token = Array.from(array).map(b => b.toString(16).padStart(2,'0')).join('');

  try {
    await addDoc(collection(db, 'tokens'), {
      token,
      recipient: name,
      used: false,
      createdAt: serverTimestamp(),
      expiresAt: expiresAt.toISOString(),
      createdBy: currentUser.email
    });

    // Build the install URL — points to your GitHub Pages index.html
    const baseUrl = window.location.origin + window.location.pathname.replace('admin.html','') + 'index.html';
    const url = `${baseUrl}?token=${token}`;
    lastGeneratedUrl = url;

    document.getElementById('gen-name-label').textContent = name;
    document.getElementById('generated-url').textContent = url;
    document.getElementById('generated-box').style.display = 'block';
    document.getElementById('recipient-name').value = '';
    loadTokens();
  } catch (e) {
    alert('Error generating token: ' + e.message);
  }
};

window.copyToken = () => {
  navigator.clipboard.writeText(lastGeneratedUrl).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '✅ Copied!';
    setTimeout(() => btn.textContent = '📋 Copy Link', 2000);
  });
};

window.loadTokens = async () => {
  const el = document.getElementById('token-list');
  el.innerHTML = '<p style="font-size:12px;color:#aaa">Loading...</p>';
  try {
    const q = query(collection(db, 'tokens'), orderBy('createdAt', 'desc'));
    const snap = await getDocs(q);
    if (snap.empty) { el.innerHTML = '<p style="font-size:12px;color:#aaa">No tokens yet.</p>'; return; }
    const now = new Date();
    el.innerHTML = '';
    snap.forEach(docSnap => {
      const d = docSnap.data();
      const expired = d.expiresAt && new Date(d.expiresAt) < now;
      const status = d.used ? 'used' : expired ? 'expired' : 'unused';
      const badgeClass = status === 'unused' ? 'badge-unused' : status === 'used' ? 'badge-used' : 'badge-expired';
      const expDate = d.expiresAt ? new Date(d.expiresAt).toLocaleDateString([],{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
      const row = document.createElement('div');
      row.className = 'token-row';
      row.innerHTML = `
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;color:#333">${d.recipient||'Unknown'}</div>
          <div style="color:#aaa;font-size:10px">Expires: ${expDate}</div>
          <div style="color:#aaa;font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${d.token?.slice(0,16)}...</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
          <span class="badge ${badgeClass}">${status}</span>
          <button class="copy-btn" onclick="window.revokeToken('${docSnap.id}')" style="border-color:#d94040;background:#fdf0f0;color:#d94040">✕</button>
        </div>`;
      el.appendChild(row);
    });
  } catch (e) {
    el.innerHTML = `<p style="font-size:12px;color:#d94040">Error: ${e.message}</p>`;
  }
};

window.revokeToken = async (id) => {
  if (!confirm('Revoke this token? The recipient will lose access.')) return;
  try {
    await deleteDoc(doc(db, 'tokens', id));
    loadTokens();
  } catch (e) {
    alert('Error: ' + e.message);
  }
};
</script>
</body>
</html>
